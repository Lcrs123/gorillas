<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillas.js - P2P Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            background-color: #0000AA;
            border: 4px solid #FFF;
            /* Mobile Responsive Fixes */
            width: 100%;
            height: auto;
            max-width: 800px;
            aspect-ratio: 4/3;
        }


        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Lobby / Menu Styles */
        #lobby-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        .lobby-box {
            border: 2px solid #55FFFF;
            padding: 30px;
            background: #222;
            max-width: 400px;
        }

        h1 { color: #55FFFF; margin-top: 0; text-shadow: 2px 2px #FF55FF; }
        
        .lobby-btn {
            background: #0000AA;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            margin: 10px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            width: 200px;
        }
        .lobby-btn:hover { background: #0000FF; }

        input.lobby-input {
            background: #000;
            border: 1px solid #55FFFF;
            color: #0F0;
            padding: 8px;
            font-family: inherit;
            font-size: 16px;
            width: 250px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* In-Game UI */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px #000;
        }

        .bottom-bar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            height: 100px;
        }

        #input-area {
            background: #CCC;
            color: #000;
            padding: 10px 20px;
            border: 2px solid #FFF;
            pointer-events: auto;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input.game-input {
            width: 60px;
            background: #000;
            color: #0F0;
            border: none;
            font-family: inherit;
            font-size: 18px;
            padding: 5px;
            text-align: center;
        }

        button.fire-btn {
            background: #AA0000;
            color: #FFF;
            border: 2px solid #FFF;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button.fire-btn:disabled { background: #555; cursor: not-allowed; }

        #status-msg { color: #FFFF55; margin-top: 10px; min-height: 1.2em;}
        
        .wind-arrow { font-size: 24px; margin-top: 5px; }

        /* Victory Overlay */
        #result-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid white;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h1>GORILLAS P2P</h1>
            <div id="initial-menu">
                <button class="lobby-btn" onclick="createGame()">Create Game</button>
                <div style="margin: 15px 0;">- OR -</div>
                <input type="text" id="join-id" class="lobby-input" placeholder="Paste Game ID Here">
                <br>
                <button class="lobby-btn" onclick="joinGame()">Join Game</button>
            </div>
            <div id="loading-menu" style="display:none;">
                <p id="loading-text">Connecting to Server...</p>
                <input type="text" id="my-id-display" class="lobby-input" readonly onclick="this.select()">
                <p style="font-size: 12px; color: #AAA;">Share this ID with your friend</p>
            </div>
        </div>
    </div>

    <div id="ui-layer" style="display:none;">
        <div class="top-bar">
            <span id="p1-name" style="color: #55FFFF">Player 1</span>
            <span id="game-status" style="color: #FFF">Waiting...</span>
            <span id="p2-name" style="color: #FF55FF">Player 2</span>
        </div>

        <div id="result-overlay">
            <h1 id="winner-text">PLAYER 1 WINS</h1>
            <button class="lobby-btn" onclick="resetGame()">Rematch</button>
        </div>

        <div class="bottom-bar">
            <div id="input-area">
                <div style="margin-right:10px; font-weight:bold;" id="turn-label">Your Turn</div>
                <div>
                    <label>Angle:</label>
                    <input type="number" class="game-input" id="angle" min="0" max="360" value="45">
                </div>
                <div>
                    <label>Vel:</label>
                    <input type="number" class="game-input" id="velocity" min="1" max="200" value="60">
                </div>
                <button class="fire-btn" id="fire-btn">Throw!</button>
                <div style="margin-left: 15px; text-align: center; font-size: 12px;">
                    <div>WIND</div>
                    <div id="wind-display" class="wind-arrow">← 10</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * GORILLAS.JS - P2P EDITION (MOBILE FIXED)
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const WIDTH = 800;
const HEIGHT = 600;

// --- Game State ---
let buildings = [];
let player1 = {}; 
let player2 = {}; 
let wind = 0;
let currentPlayer = 1;
let myPlayerNum = 0;
let isAnimating = false;
let animationId;

// --- Networking ---
let peer = null;
let conn = null;
let isHost = false;

// --- DOM Elements ---
const lobbyScreen = document.getElementById('lobby-screen');
const initialMenu = document.getElementById('initial-menu');
const loadingMenu = document.getElementById('loading-menu');
const loadingText = document.getElementById('loading-text');
const myIdDisplay = document.getElementById('my-id-display');
const uiLayer = document.getElementById('ui-layer');
const resultOverlay = document.getElementById('result-overlay');
const fireBtn = document.getElementById('fire-btn');
const angleInput = document.getElementById('angle');
const velocityInput = document.getElementById('velocity');
const windDisplay = document.getElementById('wind-display');
const statusText = document.getElementById('game-status');
const turnLabel = document.getElementById('turn-label');

const BUILDING_COLORS = ['#AA0000', '#00AAAA', '#00AA00', '#AAAAAA'];
const EXPLOSION_RADIUS = 30;

// ==========================================
// NETWORKING LOGIC
// ==========================================

function initPeer() {
    peer = new Peer();
    
    peer.on('open', (id) => {
        console.log('My ID:', id);
        if(isHost) {
            loadingText.innerText = "Waiting for Opponent...";
            myIdDisplay.value = id;
            myIdDisplay.style.display = 'block';
        }
    });

    peer.on('connection', (c) => {
        if(isHost) {
            conn = c;
            console.log("Opponent connecting...");
            setupHostConnection(); 
        }
    });

    peer.on('error', (err) => alert("Error: " + err.type));
}

function createGame() {
    isHost = true;
    myPlayerNum = 1;
    initialMenu.style.display = 'none';
    loadingMenu.style.display = 'block';
    initPeer();
}

function joinGame() {
    const hostId = document.getElementById('join-id').value.trim();
    if(!hostId) return alert("Enter ID");

    isHost = false;
    myPlayerNum = 2;
    initialMenu.style.display = 'none';
    loadingText.innerText = "Connecting...";
    loadingMenu.style.display = 'block';
    
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(hostId);
        setupGuestConnection();
    });
}

// --- HOST SPECIFIC CONNECTION SETUP ---
function setupHostConnection() {
    conn.on('open', () => {
        console.log("Connection Open. Waiting for Guest READY signal...");
    });

    conn.on('data', (data) => {
        // The Host waits for the Guest to say "READY" before sending the map
        if (data.type === 'READY') {
            console.log("Guest is ready. Sending Map...");
            startGameAsHost(); 
        } else {
            handleNetworkMessage(data);
        }
    });
}

// --- GUEST SPECIFIC CONNECTION SETUP ---
function setupGuestConnection() {
    conn.on('open', () => {
        console.log("Connected to Host. Sending READY signal...");
        // CRITICAL FIX: Tell Host we are ready to receive data
        conn.send({ type: 'READY' });
        
        loadingMenu.style.display = 'none';
        lobbyScreen.style.display = 'none';
        uiLayer.style.display = 'flex';
    });

    conn.on('data', (data) => {
        handleNetworkMessage(data);
    });
    
    conn.on('close', () => alert("Host Disconnected"));
}

function sendData(data) {
    if(conn && conn.open) conn.send(data);
}

function handleNetworkMessage(data) {
    switch(data.type) {
        case 'INIT_GAME':
            console.log("Map Received!");
            buildings = data.buildings;
            player1 = data.p1;
            player2 = data.p2;
            wind = data.wind;
            currentPlayer = 1;
            lobbyScreen.style.display = 'none'; // Ensure lobby is gone
            uiLayer.style.display = 'flex';     // Ensure UI is visible
            draw();
            updateUI();
            break;
        case 'FIRE': startThrow(data.angle, data.velocity, false); break;
        case 'SYNC_TURN': 
            currentPlayer = data.nextPlayer;
            wind = data.newWind;
            // FIX 1: Sync the destroyed building data to the Guest
            if (data.buildings) buildings = data.buildings; 
            
            // FIX 2: Unlock the Guest's animation lock so they can input their next turn
            isAnimating = false; 
            
            draw(); // Redraw to clear the banana and show the damage
            updateUI();
            break;
        case 'GAME_OVER':
            buildings = data.buildings;
            draw();
            declareWinner(data.winner);
            break;
    }
}

// ==========================================
// GAME LOGIC
// ==========================================

function startGameAsHost() {
    generateSkyline();
    placeGorillas();
    wind = (Math.floor(Math.random() * 200) - 100);
    currentPlayer = 1;

    sendData({
        type: 'INIT_GAME',
        buildings: buildings,
        p1: player1,
        p2: player2,
        wind: wind
    });

    lobbyScreen.style.display = 'none';
    uiLayer.style.display = 'flex';
    draw();
    updateUI();
}

function resetGame() {
    resultOverlay.style.display = 'none';
    if(isHost) startGameAsHost();
}

function generateSkyline() {
    buildings = [];
    let currentX = 0;
    while (currentX < WIDTH) {
        let w = Math.floor(Math.random() * 40) + 40; 
        let h = Math.floor(Math.random() * 300) + 100; 
        if (currentX + w > WIDTH) w = WIDTH - currentX;
        buildings.push({
            x: currentX, y: HEIGHT - h, w: w, h: h,
            color: BUILDING_COLORS[Math.floor(Math.random() * BUILDING_COLORS.length)],
            windows: generateWindows(w, h)
        });
        currentX += w;
    }
}

function generateWindows(w, h) {
    let wins = [];
    for(let r=10; r < h - 10; r+= 20) {
        for(let c=5; c < w - 10; c+= 15) {
            if(Math.random() > 0.4) wins.push({x: c, y: r, w: 8, h: 12});
        }
    }
    return wins;
}

function placeGorillas() {
    const b1 = buildings[1];
    player1 = { x: b1.x + b1.w/2 - 15, y: b1.y - 30, w: 30, h: 30, color: '#55FFFF' };
    const b2 = buildings[buildings.length - 2];
    player2 = { x: b2.x + b2.w/2 - 15, y: b2.y - 30, w: 30, h: 30, color: '#FF55FF' };
}

// ==========================================
// DRAWING
// ==========================================

function draw() {
    // Safety check if map hasn't loaded yet
    if(buildings.length === 0) return;

    ctx.fillStyle = '#0000AA'; 
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    drawSun();
    buildings.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = '#FFFF55';
        b.windows.forEach(win => {
            if (b.y + win.y > b.y) ctx.fillRect(b.x + win.x, b.y + win.y, win.w, win.h);
        });
    });
    drawGorilla(player1);
    drawGorilla(player2);
}

function drawSun() {
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath(); ctx.arc(WIDTH/2, 40, 25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.fillRect(WIDTH/2 - 15, 30, 30, 8);
    ctx.beginPath(); ctx.arc(WIDTH/2, 45, 10, 0, Math.PI, false); ctx.stroke();
}

function drawGorilla(p) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillRect(p.x - 5, p.y + 5, 5, 20);
    ctx.fillRect(p.x + p.w, p.y + 5, 5, 20);
    ctx.fillRect(p.x + 5, p.y - 5, 20, 10);
}

// ==========================================
// PHYSICS & INPUT
// ==========================================

fireBtn.addEventListener('click', () => {
    if (isAnimating || currentPlayer !== myPlayerNum) return;
    const angle = parseFloat(angleInput.value);
    const vel = parseFloat(velocityInput.value);
    sendData({ type: 'FIRE', angle: angle, velocity: vel });
    startThrow(angle, vel, true);
});

function startThrow(angleDeg, velocity, isMyShot) {
    isAnimating = true;
    fireBtn.disabled = true;

    const origin = currentPlayer === 1 ? player1 : player2;
    let banX = origin.x + origin.w / 2;
    let banY = origin.y - 5;
    
    let theta = (currentPlayer === 1) ? angleDeg * (Math.PI / 180) : (180 - angleDeg) * (Math.PI / 180);
    let vx = Math.cos(theta) * (velocity / 5); 
    let vy = -Math.sin(theta) * (velocity / 5); 
    let windForce = wind / 500; 

    function loop() {
        vy += 0.15; vx += windForce;
        banX += vx; banY += vy;

        draw();
        
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath(); ctx.arc(banX, banY, 4, 0, Math.PI*2); ctx.fill();

        if (banY > HEIGHT || banX < -100 || banX > WIDTH + 100) {
            finishTurn(); return;
        }

        if (isHost) {
             if (checkHit(banX, banY, player1)) { handleWin(2, banX, banY); return; }
             if (checkHit(banX, banY, player2)) { handleWin(1, banX, banY); return; }
             for (let b of buildings) {
                if (banX > b.x && banX < b.x + b.w && banY > b.y) {
                    handleBuildingHit(b, banX, banY); return;
                }
            }
        } else {
            for (let b of buildings) {
                if (banX > b.x && banX < b.x + b.w && banY > b.y) { cancelAnimationFrame(animationId); return; }
            }
             if (checkHit(banX, banY, player1) || checkHit(banX, banY, player2)) { cancelAnimationFrame(animationId); return; }
        }
        animationId = requestAnimationFrame(loop);
    }
    loop();
}

function checkHit(bx, by, p) {
    return bx > p.x && bx < p.x + p.w && by > p.y && by < p.y + p.h;
}

function handleBuildingHit(b, x, y) {
    cancelAnimationFrame(animationId);
    let impactDepth = y + (EXPLOSION_RADIUS/2);
    if (impactDepth > b.y) { b.y = impactDepth; b.h = HEIGHT - b.y; }
    drawExplosion(x, y);
    finishTurn(); 
}

function handleWin(winnerNum, x, y) {
    cancelAnimationFrame(animationId);
    drawExplosion(x, y);
    sendData({ type: 'GAME_OVER', buildings: buildings, winner: winnerNum });
    declareWinner(winnerNum);
}

function drawExplosion(x, y) {
    ctx.fillStyle = 'orange'; ctx.beginPath(); ctx.arc(x, y, EXPLOSION_RADIUS, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(x, y, EXPLOSION_RADIUS/2, 0, Math.PI*2); ctx.fill();
}

function finishTurn() {
    cancelAnimationFrame(animationId);
    if(isHost) {
        let nextP = currentPlayer === 1 ? 2 : 1;
        let newWind = (Math.floor(Math.random() * 200) - 100);
        
        // FIX 3: Include the buildings array so the Guest knows what got destroyed
        sendData({ 
            type: 'SYNC_TURN', 
            nextPlayer: nextP, 
            newWind: newWind,
            buildings: buildings 
        });
        
        currentPlayer = nextP;
        wind = newWind;
        updateUI();
    }
    isAnimating = false;
    draw(); 
}

function declareWinner(num) {
    isAnimating = false;
    cancelAnimationFrame(animationId);
    const txt = document.getElementById('winner-text');
    txt.innerText = `PLAYER ${num} WINS!`;
    txt.style.color = num === 1 ? '#55FFFF' : '#FF55FF';
    resultOverlay.style.display = 'block';
    resultOverlay.querySelector('button').style.display = isHost ? 'inline-block' : 'none';
}

function updateUI() {
    if(currentPlayer === myPlayerNum) {
        statusText.innerText = "YOUR TURN";
        statusText.style.color = "#0F0";
        fireBtn.disabled = false;
        turnLabel.innerText = "Your Turn";
    } else {
        statusText.innerText = "OPPONENT'S TURN";
        statusText.style.color = "#F00";
        fireBtn.disabled = true;
        turnLabel.innerText = "Waiting...";
    }
    if (wind > 0) windDisplay.innerText = `→ ${Math.abs(wind)}`;
    else if (wind < 0) windDisplay.innerText = `← ${Math.abs(wind)}`;
    else windDisplay.innerText = `No Wind`;
}
</script>

</body>
</html>
